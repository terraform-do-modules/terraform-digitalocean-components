name: tf-checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  complete-do-module:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@v2
    with:
      provider: none
      working_directory: './terraform/sandbox/blr1/'

# Separate job for TFlint workflow call
  tf-lint:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@v2
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
