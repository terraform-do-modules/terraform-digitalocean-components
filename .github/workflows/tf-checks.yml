name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  complete-do-module:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@f6cad30db3bfad5fc248a08ab65ac82eb8dbcb82 # pinned to latest
    with:
      provider: digitalocean
      working_directory: './terraform/sandbox/blr1/'

# Separate job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@f6cad30db3bfad5fc248a08ab65ac82eb8dbcb82 # pinned to latest
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
