name: PR Validation

on:
  pull_request:
    branches: [feat/version-test]
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  pr-validation:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/pr_checks.yml@2.1.0 # pinned to latest
    secrets: inherit
    with:
      subjectPattern: '^.+$'
