name: PR Validation

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  pr-validation:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/pr-checks.yml@1a77be93ccd008d6384fc78fb3d567c50cd963fd
    secrets: inherit
    with:
      subjectPattern: '^.+$'

