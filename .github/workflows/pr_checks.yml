name: PR Validation

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  pr-validation:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/pr_checks.yml@74df2ef7327ca06f5f7ee4cc7727a6e8b87f0959 # pinned to latest
    secrets: inherit
    with:
      subjectPattern: '^.+$'
