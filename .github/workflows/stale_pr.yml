name: Mark or close stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * 5'  # Runs every Friday midnight
  workflow_dispatch:

jobs:
  call-shared-stale:
    uses: clouddrove/github-shared-workflows/.github/workflows/stale_pr.yml@03dcb08c08de8e1798c735f548655e391f924277 # pinned to latest
    with:
      days-before-issue-stale: 30
      days-before-pr-stale: 30
      days-before-issue-close: 10
      days-before-pr-close: 10
